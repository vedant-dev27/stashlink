name: stashlink
description: Bookmark App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  receive_sharing_intent: ^1.8.1
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png